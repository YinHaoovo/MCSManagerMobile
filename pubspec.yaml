name: mcsm_app
description: MCSManager Mobile Application - Manage game servers on the go
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  riverpod: ^2.3.0
  flutter_riverpod: ^2.3.0
  
  dio: ^5.3.0
  web_socket_channel: ^2.4.0
  
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  connectivity_plus: ^5.0.0
  local_auth: ^2.1.0
  
  file_picker: ^6.0.0
  path_provider: ^2.1.0
  
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true